<div class="bg-white rounded-2xl border border-slate-200/60 shadow-sm p-8 max-w-4xl mx-auto">
    <div class="border-b border-slate-100 pb-5 mb-6">
        <h2 class="text-xl font-bold text-slate-800 tracking-tight">
            {{ isEditMode ? 'Edit Profil Karyawan' : 'Registrasi Karyawan Baru' }}
        </h2>
        <p class="text-xs text-slate-400 font-semibold mt-1">Lengkapi informasi biodata dan detail pekerjaan karyawan di
            bawah ini.</p>
    </div>

    <form [formGroup]="employeeForm" (ngSubmit)="onSubmit()" class="space-y-6">

        <!-- Form Fields Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

            <!-- Nama Lengkap -->
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Nama Lengkap</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-400">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                        </svg>
                    </span>
                    <input type="text" formControlName="name" placeholder="Contoh: Budi Santoso"
                        class="w-full pl-10 pr-4 py-2.5 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 bg-[#f8fafc] text-sm text-slate-700 transition-all duration-200" />
                </div>
                <div *ngIf="employeeForm.get('name')?.touched && employeeForm.get('name')?.invalid"
                    class="text-red-500 text-xs font-semibold mt-1.5 flex items-center gap-1">
                    <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd"
                            d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z"
                            clip-rule="evenodd"></path>
                    </svg>
                    Nama wajib diisi (minimal 3 karakter).
                </div>
            </div>

            <!-- Email -->
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Alamat Email</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-400">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z">
                            </path>
                        </svg>
                    </span>
                    <input type="email" formControlName="email" placeholder="nama@company.com"
                        class="w-full pl-10 pr-4 py-2.5 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 bg-[#f8fafc] text-sm text-slate-700 transition-all duration-200" />
                </div>
                <div *ngIf="employeeForm.get('email')?.touched && employeeForm.get('email')?.invalid"
                    class="text-red-500 text-xs font-semibold mt-1.5 flex items-center gap-1">
                    <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd"
                            d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z"
                            clip-rule="evenodd"></path>
                    </svg>
                    Format email tidak valid.
                </div>
            </div>

            <!-- No. HP -->
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">No.
                    Handphone</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-400">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M3 5a2 2 0 012-2h3.28a1 1 0 01.94.725l.548 2.2a1 1 0 01-.321.988l-1.305.98a10.582 10.582 0 004.872 4.872l.98-1.305a1 1 0 01.988-.321l2.2.548a1 1 0 01.725.94V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z">
                            </path>
                        </svg>
                    </span>
                    <input type="text" formControlName="phone" placeholder="08123456789"
                        class="w-full pl-10 pr-4 py-2.5 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 bg-[#f8fafc] text-sm text-slate-700 transition-all duration-200" />
                </div>
                <div *ngIf="employeeForm.get('phone')?.touched && employeeForm.get('phone')?.invalid"
                    class="text-red-500 text-xs font-semibold mt-1.5 flex items-center gap-1">
                    <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd"
                            d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z"
                            clip-rule="evenodd"></path>
                    </svg>
                    No. HP wajib diisi (10-13 digit angka).
                </div>
            </div>

            <!-- Departemen -->
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Departemen</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-400">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4">
                            </path>
                        </svg>
                    </span>
                    <select formControlName="department"
                        class="w-full pl-10 pr-4 py-2.5 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 bg-[#f8fafc] text-sm text-slate-655 font-medium transition-all duration-200 cursor-pointer">
                        <option value="">Pilih Departemen</option>
                        <option value="IT">IT</option>
                        <option value="HR">HR</option>
                        <option value="Finance">Finance</option>
                    </select>
                </div>
            </div>

            <!-- Jabatan -->
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Jabatan /
                    Posisi</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-400">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z">
                            </path>
                        </svg>
                    </span>
                    <input type="text" formControlName="position" placeholder="Contoh: Frontend Developer"
                        class="w-full pl-10 pr-4 py-2.5 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 bg-[#f8fafc] text-sm text-slate-700 transition-all duration-200" />
                </div>
            </div>

            <!-- Gaji -->
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Nominal Gaji
                    Bulanan</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-400">
                        <span class="text-xs font-bold text-slate-400">Rp</span>
                    </span>
                    <input type="number" formControlName="salary" placeholder="Contoh: 8500000"
                        class="w-full pl-10 pr-4 py-2.5 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 bg-[#f8fafc] text-sm text-slate-700 transition-all duration-200" />
                </div>
            </div>

        </div>

        <!-- Buttons Row -->
        <div class="flex gap-3 pt-6 border-t border-slate-100 mt-8 justify-end">
            <!-- Batal Button -->
            <button *ngIf="isEditMode" type="button" (click)="resetForm()"
                class="bg-slate-100 hover:bg-slate-200 text-slate-700 font-semibold py-2.5 px-6 rounded-xl transition-colors text-sm shadow-sm">
                Batal / Selesai
            </button>

            <!-- Submit Button -->
            <button type="submit" [disabled]="employeeForm.invalid"
                class="bg-blue-600 hover:bg-blue-700 disabled:bg-slate-100 disabled:text-slate-400 disabled:border disabled:border-slate-200 text-white font-bold py-2.5 px-8 rounded-xl transition-colors text-sm shadow-md disabled:shadow-none inline-flex items-center gap-1.5">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4">
                    </path>
                </svg>
                {{ isEditMode ? 'Simpan Perubahan' : 'Daftarkan Karyawan' }}
            </button>
        </div>

    </form>
</div>
