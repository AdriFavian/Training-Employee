<div class="max-w-lg mx-auto bg-white p-6 rounded-lg shadow-md mt-6">
    <h2 class="text-xl font-bold text-gray-800 mb-4">
        {{ isEditMode ? 'Edit Data Karyawan' : 'Tambah Karyawan Baru' }}
    </h2>

    <form [formGroup]="employeeForm" (ngSubmit)="onSubmit()" class="space-y-4">
        <div>
            <label class="block text-sm font-medium text-gray-700">Nama Lengkap</label>
            <input type="text" formControlName="name"
                class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500" />
            <div *ngIf="
                employeeForm.get('name')?.touched && employeeForm.get('name')?.invalid
                " class="text-red-500 text-xs mt-1">
                Nama wajib diisi (minimal 3 karakter).
            </div>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700">Email</label>
            <input type="email" formControlName="email"
                class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500" />
            <div *ngIf="
                employeeForm.get('email')?.touched &&
                employeeForm.get('email')?.invalid
                " class="text-red-500 text-xs mt-1">
                Format email tidak valid.
            </div>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700">No. HP</label>
            <input type="text" formControlName="phone"
                class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500" />
            <div *ngIf="
                employeeForm.get('phone')?.touched &&
                employeeForm.get('phone')?.invalid
                " class="text-red-500 text-xs mt-1">
                No. HP wajib diisi (10-13 digit angka).
            </div>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700">Departemen</label>
            <select formControlName="department"
                class="w-full px-3 py-2 border rounded-lg bg-white focus:ring-2 focus:ring-blue-500">
                <option value="">Pilih Departemen</option>
                <option value="IT">IT</option>
                <option value="HR">HR</option>
                <option value="Finance">Finance</option>
            </select>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700">Jabatan</label>
            <input type="text" formControlName="position"
                class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500" />
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700">Gaji</label>
            <input type="number" formControlName="salary"
                class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500" />
        </div>

        <div class="flex gap-2">
            <button type="submit" [disabled]="employeeForm.invalid"
                class="flex-1 bg-blue-600 hover:bg-blue-700 disabled:bg-gray-400 text-white font-medium py-2 px-4 rounded-lg transition-colors">
                {{ isEditMode ? 'Simpan Perubahan' : 'Simpan Karyawan' }}
            </button>

            <button *ngIf="isEditMode" type="button" (click)="resetForm()"
                class="bg-gray-300 hover:bg-gray-400 text-gray-700 font-medium py-2 px-4 rounded-lg transition-colors">
                Batal
            </button>
        </div>
    </form>
</div>
